name: Get Version
description: Get the version of the project from the tag or branch name.

inputs:
  version-source:
    description: The source to get the version from (tag or branch).
    required: false
    default: tag

outputs:
  version:
    description: The version of the project
    value: ${{ steps.get-version.outputs.version }}

runs:
  using: composite
  steps:
    - id: get-version
      shell: bash
      run: |
        if [[ "${{ inputs.version-source }}" == "tag" ]]; then
          version="${GITHUB_REF_NAME#v}"
        else
          version="${GITHUB_REF_NAME#release/v}"
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"